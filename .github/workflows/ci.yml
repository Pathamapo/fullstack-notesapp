name: CI Pipeline

on:
  push:
    branches: [ "main", "dev-ci-docker" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install & Test Backend
        run: |
          cd backend
          npm install
          npm test -- --watchAll=false

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install & Test Frontend
        run: |
          cd frontend
          npm install
          npm test -- --watchAll=false