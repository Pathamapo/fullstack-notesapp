name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: SonarCloud + Trivy + Docker + Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Scan dependencies (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASS }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      - name: Build Backend Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USER }}/notesapp-backend:latest ./backend

      - name: Push Backend Docker image
        run: docker push ${{ secrets.DOCKERHUB_USER }}/notesapp-backend:latest

      - name: Build Frontend Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USER }}/notesapp-frontend:latest ./frontend

      - name: Push Frontend Docker image
        run: docker push ${{ secrets.DOCKERHUB_USER }}/notesapp-frontend:latest

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Set up kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml

      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl get nodes
          kubectl apply -f k8s/
