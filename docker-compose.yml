version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: notes-db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: notes-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_DB_URI=mongodb://mongodb:27017/notesapp
      - SESSION_SECRET=secret123  

  frontend:
    build: ./frontend
    container_name: notes-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      