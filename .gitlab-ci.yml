stages:
  - test
  - build
  - push
  - deploy

# Stage 1: Test (เช็คโค้ดก่อนว่าพังไหม)
test_backend:
  stage: test
  image: node:22
  script:
    - cd backend
    - npm install
    - npm test -- --watchAll=false
  only:
    - main
    - dev-ci-docker

test_frontend:
  stage: test
  image: node:18
  script:
    - cd frontend
    - npm install
    - npm test -- --watchAll=false
  only:
    - main
    - dev-ci-docker

# Stage 2: Build Images (สร้างแผ่น CD ของแอปเรา)
build_images:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest ./backend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest ./frontend
    - echo "Build success!"

# Stage 3: Push (เอาแผ่น CD ไปเก็บไว้บนหิ้ง Registry)
# ขั้นตอนนี้เพื่อนคนที่ 3 (DevSecOps) มักจะมาเซ็ตต่อเพื่อเก็บ Image ไว้ใช้งาน
push_images:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:latest

# Stage 4: Deploy (สั่งรันบนเครื่องจริง/K8s)
deploy_local:
  stage: deploy
  script:
    - echo "Deploying to server..."
    # ตรงนี้แหละที่คนที่ 3 จะเอาไปทำต่อเพื่อลง AWS หรือ K8s
  environment: production